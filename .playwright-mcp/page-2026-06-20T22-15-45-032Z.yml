          - generic [ref=e274]:
            - text: The most critical performance factor is the number of draw calls. A draw call is invoked for each object within a C3D file. So if you have 3000 C3D files and each has 30 objects inside, that's 90000 draw calls (texture swaps) per frame!
            - text: So the golden rule is group, group, group. It's better to use one big texture and group all objects within the C3D into one object. Try to even group small C3D files into bigger ones.
            - text: The number of vertices/faces is by far less critical on todays hardware.
          - generic [ref=e275]:
            - text: Uros Bergant,
            - text: Condor Team
