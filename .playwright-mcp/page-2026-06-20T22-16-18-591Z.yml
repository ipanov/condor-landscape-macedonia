          - generic [ref=e81]:
            - text: I've recently done some small trial landscapes and added airports using landscape editor, placing objects around the airfield using the editor. I am now learning how to use Wings3D to construct more detailed airports. I am grateful for the work that so many of you have done, especially Xavier Delaborde, in clearly giving step by step instructions re how to construct high quality landscapes and airports.
            - text: It occurs to me now that I don't fully understand how these two approaches integrate. For example, if I decorate an airport with objects in LE and then construct a more detailed version of the same airport with Wings3D, creating new G and O files, how does Condor2 prioritize which objects are chosen? Are they all integrated together, or is there some hierarchy about which objects are given preference. Are there some guidelines about which objects should be added via each method? Thanks for the assistance.
            - text: Ed
