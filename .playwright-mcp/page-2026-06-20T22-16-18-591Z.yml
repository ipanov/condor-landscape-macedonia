          - generic [ref=e113]:
            - text: Hi Ed,
            - text: Generally I put only buildings in the O file of an airport, because they are in most times "single" in scenery.
            - text: All the other objects relative to one airport are only one instance of the object standing in the World directory of the scenery, which can be easily duplicated for all the different airports of the scenery in Landscape Editor. If you put this kind of object in the O file, you will increase the numbers of vertices of the O File for each instance of the objects.
            - text: "There are other technical reasons:"
            - text: "1/ when a glider approaches from an airport:"
            - text: The G and O files are loaded when it reaches 23 km in the pilot screen.
            - text: The other objects are only loaded at 5 km.
            - text: This may avoid too many things to be loaded in the same time.
            - text: 2/ It is easier to move one instance of one object in Landscape Editor than to open W3D to move the object. Make a new O file, etc.
            - text: 3/ It is easy to change the position and direction of an airport in Landscape Editor with airport properties, but it is also very easy to move and rotate all the other objects relative to one airport because you can select all of them in Landscape Editor and apply the same transformation.
            - text: Choose the right compromise.
            - text: My two little pennies.
            - text: "PS: Thank you for your kind words!"
          - generic [ref=e114]: "*****- Xavier - (XDL - VR FAN) *****"
