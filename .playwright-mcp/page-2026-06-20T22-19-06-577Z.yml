          - generic [ref=e158]:
            - text: "My landscape is finished as far as I come for now. I thought first, it will be nice to add buildings automatically to the landscapes, but I was wrong: It is amazing!"
            - strong [ref=e159]: The tool
            - text: The description is good, I followed it word by word and got it to run with the first try, I don't see a point in it worth to make it better.
            - strong [ref=e160]: The import from OSM
            - text: For my landscape (25 x 18 tiles) I need 7200 c3d files, one for each patch. At the first step for each patch is a mtl and an obj file to import from OSM. Runtime netto are round about 1 -2 days, but there were some errors (see below). So I didn't got the files for 12 patches. That is a good quota, nevertheless will these patches look not good, but first you have to find them while flying (0,16 % of the area). If there are only a few buildings, you will not see it, but in one patch were more than 25000 buildings, if this patch is a part of a bigger town it will be good visible.
            - strong [ref=e161]: The import to Condor
            - text: "If you import a lot of files into Condor via LE, it will crash. If that happens, it says, that it can't import a filename. If you click OK it continues until the next file were it crashes. My solution for that is:"
            - text: When the first message appears, kill LE via taskmanager, copy then all c3d files from working\autogen to autogen and delete (or backup) the mtl and obj files for the created c3d files. Start then LE and continue importing. If you don't delete the mtl and obj files from working\autogen, the import will create the c3d files again. The crash happens due to less memory. It happens after creating 500 - 1000 c3d files
            - strong [ref=e162]: Ressources
            - text: My landscape has a size of 6 - 7 GB, the autogen files are nearly 20 GB, that is a very big difference. It would be nice, if missing autogen files will not be calculated as cheating, then everybody can decide, if 7 GB is enough or if he/she will use 27 GB for the same landscape in a nicer version
            - strong [ref=e163]: OSM errors
            - text: I found three different errors. Is there an update for the python file, or has someone made a workaround? I guess that bad data is the main reason for the errors, so maybe it's possible to ignore the bad buildings and install the good ones. In my example with 25000 buildings you will not see if 1000 are missing, but missing all will be a big hole.
            - text: If someone is interested, I can send the h999999.obj and h999999.txt files from working\heightmaps to the patches where the errors occurred.
            - text: Error 1, the main error with 10 patches
