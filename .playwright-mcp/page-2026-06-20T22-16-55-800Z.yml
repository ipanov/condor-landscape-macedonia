            - text: Autogen patches are the prefered way of placing objects for Condor 3. They are more optimised compared to placing them via the landscape editor. Both loading and collision detection. Objects via the landscape editor were kept for backwards compatibility. They will load the same as Condor2.
            - text: Autogen loads up to 3 patches (17km) away from your position.
          - generic [ref=e179]:
            - text: PH-1504, KOE
