                - text: What would be now the best way to bring it into Condor3?
                - text: Could it be added to an already existing landscape like WestGermany3 as an Objekt to the already defined EDKL airport or do I need to create a landscape from scratch?
                - text: Matthias
            - text: You need to add your object either to the Autogen patches or to the airportO file, otherwise the visibility distance would be too short.
            - text: You can do it easily in blender with patchviewer. If you add it to the AirportO, you won't have compatibility problems. If you modify one or more Autogen files, you need to generate a new .oha file, and the scenery won't be compatible anymore; you'll have to change the scenery version in the ini file.
            - text: But the Autogen integration is much more efficient, so I think it's better to use it.
