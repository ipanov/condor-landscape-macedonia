            - text: Sat Mar 17, 2007 7:30 pm
          - generic [ref=e91]:
            - text: I've been planning to create the Czech Republic scenery for a long time and I'm even working on a small area of it as a test bed for testing texturing and modelling techniques. Finally, some time ago, Cadfael and I have decided to join our forces and bring you another high quality scenery
            - img ";)" [ref=e92]
            - text: Today, the first step was taken towards delivering it to you... Terrain is ready and calibrated to the highest precision I'm able to achieve - length of the task from the west most airport to the east most airport is the same in Condor task planner as in See You, the same applies to the task from the north most to the south most airport. Polygon task around all borderline airports only differs by 100 meters (737,2 km in Condor vs 737,3 km in See You), which I think is also very good.
            - text: Looking at the map below many of you may wonder why does the scenery overlap with the Slovakia so much.
            - text: "We've been discussing this a lot and the area in the map is the best compromise we could think of. We wanted to ensure two basic things:"
            - text: 1) we wanted to keep the whole northern mountainous region intact, which means we had to include parts of the area that are covered by Slovakia. The reason for this is the fact that many long distance flights are achieved there and with the discovery of the wave active area in Jeseniky (although much weaker in Condor than in real life) we believe the same can be done for Krkonose and thus could allow us to fly longer tasks in mountains.
            - text: 2) we wanted to strech the scenery to the west as much as possible.
            - text: Due to the size limits of Condor scenery we couldn't cover the whole area of the Czech Republic, but we believe that the scenery covers the most attractive soaring regions of it.
            - text: We'll begin "fulltime" work on the scenery by the time Cadfael releases his Slovakia 2.5.
            - text: "The map of the area (click on the picture to get bigger version with more airport and turn point names):"
            - link "Image" [ref=e93] [cursor=pointer]:
              - /url: http://condor.brozek.org/temp/czech_mapa_big.jpg
              - img "Image" [ref=e94]
