                - text: You can see that on blue sky FPS hit 200FPS but when i point view to the object it decrase to 30-40 FPS. All object is very simple - like single box.
                - text: So, for example lets stay with that box.
                - text: "1* What is count to rate FPS: vertices, edge or surface?"
