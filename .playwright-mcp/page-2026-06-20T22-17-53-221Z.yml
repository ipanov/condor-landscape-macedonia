          - generic [ref=e152]:
            - text: That's actually a misunderstanding.
            - text: While one OBJ is saved as one landscape object (one C3D file), it can actually contain a whole "scene" consisting of many separate objects = parts of the scene. E.g. if you model a static airplane, it doesn't have to be one solid object but it can consist of separate fuselage, canopy, wheels, wings, etc.
            - text: Each of the separate parts (one "g" section of the OBJ file) can only have one material assigned to it (and each material can only have one texture). So if your OBJ contains 10 parts/objects, each of them can have its own material.
            - text: We are emphasizing the 1 part/1 material relationship in V2 as many 3D modelling applications actually allow the modeller to assign a material to a part on the polygon level and this way one part can have multiple materials assigned to it => it is a "multimaterial" object.
