          - generic [ref=e93]:
            - text: Hi all,
            - text: I experimented with photogrammetry data to be used in Condor landscapes with mixed results.
            - text: The data imported looks great, but comes completely unoptimized and has millions of faces. It's really hard
            - text: to reduce the face count and in the same time maintain the great looks of photogrammetry cities.
            - text: So far it's been a giant hit on my frame rate with my machine (VM on Mac). It's not really usable so far. However,
            - text: to me, it's more of a proof of concept. I wanted to see what it looks like and how hard it is to get 3D objects like that into Condor.
            - text: I'm sure it's not worth the hours it takes to manually edit the objects down to workable face count. The build-in tools
            - text: that come with Blender are not satisfactory, unless there's a way to reduce mesh faces that I'm unaware of...
            - text: The model needs to be tiled, edited, texture baked, rotated and placed in Condor.
            - text: Next issue, precise placing of city tiles without visible gaps in Condor Landscape Editor is more than painful.
            - text: It could be automated though. We could make use of a XML file that comes with the unedited data. This would be a job for an
            - text: embitioned programmer... who I'm not.
            - img ":)" [ref=e94]
            - text: I'll give it another try with a lower LOD, but then textures get blurred and the buildings lose their straight edges.
            - text: Here are some results.
