                - text: Hi all,
                - text: "after some time has passed and computers and maybe software as well had become more powerfull:"
                - text: Did someone continue with this workstream ?
                - text: Can someone maybe give me e recipe or a guideline for the steps needed to get Google Maps Data into Condor?
                - text: Thx in advance
                - text: Matthias
            - text: Yes I did. We don't import photogrammetry. I've written a Blender plugin that works together with BLOSM to downloads OpenStreetMap (OSM) data. It will automatically reproject the building locations to the condor projection. It will then generate generic buildings and export them to a format for Condor. If you look at the recent screenshots you can see that there are buildings in the background. I've also made the possibility to import powerline locations and made a Geometry Node setup that will generate realistic cables with sag due to gravity ect.
            - text: Slovenia3 has many, many buildings. I don't have an estimate, but if it is well into the 100.000's I wouldn't be surprised. I know the BLOSM plugin we use to download the OSM data does have a possibility to download photogrammetry as well. However, as this uses google maps data, and the terms of service of google don't allow bulk download of this data, my tools don't support it.
            - text: If you have a free source of photogrammetry data that allows bulk download, you are free to modify the plugin once it is released together with Condor3.
            - text: Also, the reason for the high framerate hit in Condor2 is the collision detection. We have optimised it for Condor3, so even high densities of objects on a patch will have an almost negligible framerate hit in Condor3. Still, optimising the number of vertices and reducing the number of textures is always better for performance.
          - generic [ref=e472]:
            - text: PH-1504, KOE
            - text: Condor beta team/Plane developer
