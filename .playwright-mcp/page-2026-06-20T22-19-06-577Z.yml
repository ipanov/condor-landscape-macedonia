                - text: "When you export from Blender make sure you use the correct options, this works for me:"
                - text: "Select: \"Apply modifiers\", \"UV Coordinates\", \"Normals\", \"Triangulated Mesh\", \"Materials Export\"."
                - text: Just guessing, as I don't know the obj format, but my guess is "f 1/1/1 5/2/1 7/3/1 3/4/1" is a line for a face with 4 vertices. If you check the lines starting with f in the original file it has 3 sets of numbers, not 4 like yours. Which means yours has not been triangulated. Condor expects all faces to have 3 vertices. So make sure "Triangulated Mesh" is turned on in the obj export options.
            - text: Thank you very much for your explanations, I will keep it in mind if I need it
