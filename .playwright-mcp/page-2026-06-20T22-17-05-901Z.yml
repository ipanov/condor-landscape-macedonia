          - generic [ref=e116]:
            - text: "There is a sort of way by using OSM2World:"
            - link "http://osm2world.org/" [ref=e117] [cursor=pointer]:
              - /url: http://osm2world.org/
            - text: Select your area of interest on 'Open Street Map', save the map.osm, run OSM2World via command line, export as a wavefront .obj, import into your 3D application, then convert to a c3d file.
            - text: The pic is an example of all the buildings on the North site of RAF Henlow (not the hangers, they are nicely modelled by me). OSM2World allocates colours to walls and roofs etc. but cannot be used in a condor c3d because of the single texture rule. So in the pic all the buildings are a single colour.
            - text: However each object can be UV mapped and all the objects grouped into a single object file. I did this for the Henlow site and I am also experimenting for larger airports i.e. Gatwick and Stansted. Also Xavier has recently posted about how to use UV mapped textures in multiple objects.
            - text: There is also another problem. I made an object for all the buildings in Biggleswade, did not UV map them all, but just tried the object in Condor. Unfortunately the Condor landscape editor was unable to correctly rotate the object such that all the buildings were in the correct place. the same problem as aligning a runway. I understand that an updated version of Landscape editor is in the pipeline and may have improved object alignment.
            - text: I have not yet worked out how to get the roof shape from OSM2World so all the buildings have flat roofs.
            - text: "Some YouTube guides:"
            - link "https://www.youtube.com/watch?v=xo9BS3dpD5o" [ref=e118] [cursor=pointer]:
              - /url: https://www.youtube.com/watch?v=xo9BS3dpD5o
            - link "https://www.youtube.com/watch?v=R1ROxTn ... dG60aeiGFW" [ref=e119] [cursor=pointer]:
              - /url: https://www.youtube.com/watch?v=R1ROxTnD3E0&list=PLpQEkf7-ygeaM-kKQlZBD-NdG60aeiGFW
            - link "https://www.youtube.com/watch?v=9J5Q1RUGZCU" [ref=e120] [cursor=pointer]:
              - /url: https://www.youtube.com/watch?v=9J5Q1RUGZCU
            - text: Note - you can buy an OSM plugin for Blender.
