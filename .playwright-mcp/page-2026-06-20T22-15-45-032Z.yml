                - text: Second topic that i hit during recording was strange behavior of the glider during entry and leaving thermal - you can see it from 7:00 on the movie. Is it correct? I set wind to 0km/h, wave also all on 0, thermals as below
                - text: thermalsetting.jpg
            - text: FPS get a hit with many faces.
            - text: The stuttering in the thermal is the loading of one or multiple very large files that get into (visual) range I think.
            - text: Do you remember the Hahnweide SW Germany scenery in Condor V1..? If you came within 10km of the Hahnweide airport you had a very big hickup. Then the whole airport with all the details had to be loaded (unnecessary detailed for that distance). This is the same, but then with many different building blocks that are loaded when in visual range. It's better to have only some small blocks that are used everywhere and stay in memory then many different ones. And then when the FPS drop too many then stop adding objects. Even remove some not so important ones.
            - text: When flying on flat terrain you usually are very high during the flight. Then houses hardly have any height. It's better to only make objects that are higher then 15m up to 30m.
