          - generic [ref=e81]:
            - text: Had a quick experiement at making a small village; and it's not easy. Given that North UK map also contains some actual cities - some thought really has to go into the quickest and easiest way to generate a realistic looking town that isn't a bunch of oversized randomly placed buildings.
            - text: My current suggestion is create a bunch of stock buildings that have their own UV maps and merge them all into a single blender mesh; I'm not sure if that will preserve the textures/UVs correctly however; and even trying to do a small village with repetitions of the exact same model took considerable time.
            - text: Any better ideas below please - or are we destined to have pancake-flat towns and villages in our landscapes?
            - text: Someone should go and steal the tech used for the new Microsoft Flight Simulator....
