          - generic [ref=e144]:
            - text: Yes create a Wings file with all of the airport buildings in it using a properly scaled background image to place things correctly Make the runway first to exact measurements (work at 1:10 and only enlarge just before writing the .obj - check relationships and placement on the ground after resizing) and then scale the background image to match your runway. There are limits to how many buildings you can make into one object - group them into approximately 250meter blocks otherwise you can run into complications with a large object which Condor doesn't seem to like too much suffering a drop in frames per second of playback. (This is only really an issue in very extensive airports). Map all the buildings onto one image per block.
            - text: Other objects like cars etc. should be placed in LE.
